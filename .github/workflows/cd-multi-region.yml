name: CD - Multi-Region Deployment

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/cd-multi-region.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      regions:
        description: 'Comma-separated list of regions to deploy to (leave empty for all enabled)'
        required: false
        type: string
      enable_global_tables:
        description: 'Enable DynamoDB Global Tables for cross-region replication'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '18.x'

jobs:
  # Determine deployment regions
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      regions: ${{ steps.set-regions.outputs.regions }}
      matrix: ${{ steps.set-regions.outputs.matrix }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      
      - name: Determine regions
        id: set-regions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.regions }}" ]; then
            # Use manually specified regions
            REGIONS="${{ github.event.inputs.regions }}"
          else
            # Get regions from configuration based on environment
            node -e "
              const { getDeploymentRegions } = require('./src/config/regions');
              const env = '${{ steps.set-env.outputs.environment }}';
              const regions = getDeploymentRegions(env);
              console.log(regions.join(','));
            " > regions.txt
            REGIONS=$(cat regions.txt)
          fi
          
          echo "regions=$REGIONS" >> $GITHUB_OUTPUT
          
          # Create matrix JSON
          echo "matrix={\"region\":[$(echo $REGIONS | sed 's/[^,]*/"&"/g' | sed 's/,/,/g')]}">> $GITHUB_OUTPUT
          
          echo "Deployment regions: $REGIONS"

  # Deploy to each region
  deploy-region:
    name: Deploy to ${{ matrix.region }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        region: ${{ fromJson(needs.prepare.outputs.matrix).region }}
    environment:
      name: ${{ needs.prepare.outputs.environment }}-${{ matrix.region }}
      url: https://console.aws.amazon.com/cloudformation/home?region=${{ matrix.region }}#/stacks
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', matrix.region | replace('-', '_') | upper)] }}
          aws-region: ${{ matrix.region }}
          mask-aws-account-id: true
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Deploy stack to ${{ matrix.region }}
        env:
          CDK_DEFAULT_REGION: ${{ matrix.region }}
        run: |
          echo "🚀 Deploying to ${{ matrix.region }}..."
          
          # Build context parameters
          CONTEXT_PARAMS="-c region=${{ matrix.region }}"
          CONTEXT_PARAMS="$CONTEXT_PARAMS -c createSampleApp=false"
          CONTEXT_PARAMS="$CONTEXT_PARAMS -c environment=${{ needs.prepare.outputs.environment }}"
          
          if [ "${{ github.event.inputs.enable_global_tables }}" = "true" ]; then
            CONTEXT_PARAMS="$CONTEXT_PARAMS -c enableGlobalTables=true"
          fi
          
          # Deploy
          npx cdk deploy \
            --require-approval never \
            --context @$CONTEXT_PARAMS \
            2>&1 | tee deploy.log
          
          # Check deployment status
          if grep -q "deployment successful" deploy.log || \
             grep -q "EcsFargateSpotFailoverStack-${{ matrix.region }}" deploy.log; then
            echo "✅ Deployment to ${{ matrix.region }} successful"
          else
            echo "⚠️ Check deployment logs for ${{ matrix.region }}"
          fi
      
      - name: Verify deployment
        run: |
          # Wait for stack to be ready
          aws cloudformation wait stack-create-complete \
            --stack-name EcsFargateSpotFailoverStack-${{ matrix.region }} \
            --region ${{ matrix.region }} 2>/dev/null || \
          aws cloudformation wait stack-update-complete \
            --stack-name EcsFargateSpotFailoverStack-${{ matrix.region }} \
            --region ${{ matrix.region }} 2>/dev/null || \
          true
          
          # Get stack outputs
          echo "Stack outputs:"
          aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack-${{ matrix.region }} \
            --region ${{ matrix.region }} \
            --query 'Stacks[0].Outputs' \
            --output table
      
      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ matrix.region }}
          path: |
            cdk.out/
            deploy.log
          retention-days: 7
      
      - name: Notify Slack - Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: '✅ Deployed to ${{ matrix.region }} (${{ needs.prepare.outputs.environment }})'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify Slack - Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          text: '❌ Failed to deploy to ${{ matrix.region }} (${{ needs.prepare.outputs.environment }})'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Deploy to global resources (Route53, etc.)
  deploy-global:
    name: Deploy Global Resources
    runs-on: ubuntu-latest
    needs: [prepare, deploy-region]
    if: github.event.inputs.enable_global_tables == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Configure AWS Credentials (Primary Region)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_US_EAST_1 }}
          aws-region: us-east-1
          mask-aws-account-id: true
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Deploy Global Tables
        run: |
          echo "🌐 Setting up DynamoDB Global Tables..."
          # Global tables are managed in the primary region stack
          # This step ensures proper replication setup

  # Post-deployment validation
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: [prepare, deploy-region]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Configure AWS Credentials (Primary)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_US_EAST_1 }}
          aws-region: us-east-1
          mask-aws-account-id: true
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run health checks
        run: |
          REGIONS="${{ needs.prepare.outputs.regions }}"
          
          for region in $(echo $REGIONS | tr ',' ' '); do
            echo "🏥 Health check for $region..."
            
            # Check DynamoDB table
            aws dynamodb describe-table \
              --table-name fargate-spot-error-counter \
              --region $region > /dev/null 2>&1 && \
              echo "  ✅ DynamoDB table exists" || \
              echo "  ❌ DynamoDB table not found"
            
            # Check Step Functions
            aws stepfunctions list-state-machines \
              --region $region \
              --query 'stateMachines[*].name' \
              --output table
            
            # Check Lambda functions
            aws lambda list-functions \
              --region $region \
              --query 'Functions[*].FunctionName' \
              --output table
          done
      
      - name: Run integration tests
        run: |
          # Run integration tests against the deployed infrastructure
          echo "Running integration tests..."
          # npm run test:integration

  # Summary
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [prepare, deploy-region, validate]
    if: always()
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 🌍 Multi-Region Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.prepare.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Regions:** ${{ needs.prepare.outputs.regions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Global Tables:** ${{ github.event.inputs.enable_global_tables || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Region | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          
          REGIONS="${{ needs.prepare.outputs.regions }}"
          for region in $(echo $REGIONS | tr ',' ' '); do
            if [ "${{ needs.deploy-region.result }}" = "success" ]; then
              echo "| $region | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $region | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify CloudWatch dashboards in each region" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test failover functionality" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Configure Route53 health checks if needed" >> $GITHUB_STEP_SUMMARY
