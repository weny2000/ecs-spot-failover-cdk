name: CD - Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (tag)'
        required: true
        type: string
      sampleAppDesiredCount:
        description: 'Sample App Desired Count'
        required: false
        default: '3'
        type: string
      skipTests:
        description: 'Skip integration tests'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  AWS_REGION: us-east-1
  CDK_DEFAULT_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  pre-deployment-check:
    name: Pre-Deployment Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Verify tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            echo "✅ Tag ${{ github.event.inputs.version }} exists"
          else
            echo "❌ Tag ${{ github.event.inputs.version }} not found"
            exit 1
          fi

      - name: Run security scan
        uses: securecodewarrior/github-action-add-sarif@v2
        continue-on-error: true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deployment-check
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (if needed)
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID_PROD }}/${{ env.AWS_REGION }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_PROD }}

      - name: CDK Diff
        run: npx cdk diff
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_PROD }}

      - name: Deploy to Production
        run: |
          npx cdk deploy --require-approval never \
            -c env=prod \
            -c sampleAppDesiredCount=${{ github.event.inputs.sampleAppDesiredCount || '3' }}
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_PROD }}

      - name: Get Stack Outputs
        id: outputs
        run: |
          echo "cluster_name=$(aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ClusterName`].OutputValue' \
            --output text)" >> $GITHUB_OUTPUT
          echo "alb_dns=$(aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' \
            --output text)" >> $GITHUB_OUTPUT
          echo "topic_arn=$(aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'Stacks[0].Outputs[?OutputKey==`NotificationTopicArn`].OutputValue' \
            --output text)" >> $GITHUB_OUTPUT

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ github.event.inputs.version }}',
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Deployed to production'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'http://${{ steps.outputs.outputs.alb_dns }}'
            });

      - name: Send deployment notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Production Deployment Complete",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment Complete"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.event.inputs.version }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Cluster:*\n${{ steps.outputs.outputs.cluster_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*ALB:*\nhttp://${{ steps.outputs.outputs.alb_dns }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Deployment time: ${{ github.event.created_at }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for services to stabilize
        run: |
          CLUSTER_NAME=$(aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ClusterName`].OutputValue' \
            --output text)
          
          SPOT_SERVICE=$(aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'Stacks[0].Outputs[?OutputKey==`SpotServiceName`].OutputValue' \
            --output text)
          
          echo "Waiting for services to stabilize..."
          aws ecs wait services-stable \
            --cluster $CLUSTER_NAME \
            --services $SPOT_SERVICE

      - name: Run smoke tests
        run: |
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' \
            --output text)
          
          echo "Running smoke tests..."
          
          # Health check with retries
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/)
            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: Got HTTP $HTTP_CODE, retrying..."
            sleep 10
          done
          
          echo "❌ Health check failed"
          exit 1

      - name: Verify CloudWatch logs
        run: |
          LOG_GROUP="/ecs/fargate-spot-sample-app"
          
          # Check if log group exists and has recent logs
          aws logs describe-log-groups --log-group-name-prefix $LOG_GROUP
          
          echo "✅ CloudWatch logs verified"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Smoke tests failed. Initiating rollback..."
          
          # Get previous stack state and rollback
          aws cloudformation describe-stack-events \
            --stack-name EcsFargateSpotFailoverStack \
            --query 'StackEvents[?ResourceStatus==`CREATE_COMPLETE` || ResourceStatus==`UPDATE_COMPLETE`].[LogicalResourceId,ResourceStatus,Timestamp]' \
            --output table
          
          # Send rollback notification
          echo "Rollback would be executed here in a real scenario"
        continue-on-error: true

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: failure()
    steps:
      - name: Send failure notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Production Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ github.event.inputs.version }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Workflow Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
